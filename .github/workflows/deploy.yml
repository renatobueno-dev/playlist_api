name: CI-CD Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_NAME: music-platform
  NAMESPACE: music-platform
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/music-platform-api

jobs:
  validate:
    name: Validate Build And Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall app

      - name: Build Docker image (validation only)
        run: docker build -t music-platform-api:ci .

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/music-platform

      - name: Helm template render
        run: helm template music-platform helm/music-platform >/tmp/rendered.yaml

  deploy:
    name: Build Push And Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && secrets.KUBE_CONFIG_DATA != ''
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "${KUBE_CONFIG_DATA}" ]; then
            echo "::error::Missing required secret KUBE_CONFIG_DATA"
            exit 1
          fi
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "${HOME}/.kube/config"

      - name: Prepare namespace for Istio sidecar injection
        run: |
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "${NAMESPACE}" istio-injection=enabled --overwrite

      - name: Deploy Helm release
        run: |
          helm upgrade --install "${RELEASE_NAME}" helm/music-platform \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set api.image.repository="${IMAGE_NAME}" \
            --set api.image.tag="${GITHUB_SHA}"

      - name: Apply Istio traffic and security policies
        run: |
          kubectl apply -f k8s/istio/traffic-management.yaml
          kubectl apply -f k8s/istio/security-policies.yaml

      - name: Verify rollout and security resources
        run: |
          kubectl rollout status deployment/music-platform-api -n "${NAMESPACE}" --timeout=300s
          kubectl rollout status statefulset/music-platform-db -n "${NAMESPACE}" --timeout=300s
          kubectl get pods -n "${NAMESPACE}" -o wide
          kubectl get gateway,virtualservice,destinationrule -n "${NAMESPACE}"
          kubectl get peerauthentication,authorizationpolicy -n "${NAMESPACE}"

  deploy-skipped:
    name: Deploy Skipped (Missing Secret)
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && secrets.KUBE_CONFIG_DATA == ''
    steps:
      - name: Report missing deploy secret
        run: |
          echo "::warning::Skipping deploy because KUBE_CONFIG_DATA is not configured."
          echo "Set repository secret KUBE_CONFIG_DATA (base64 kubeconfig) to enable automated deploy."

name: CI-CD Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_NAME: music-platform
  NAMESPACE: music-platform
  DB_EXISTING_SECRET_NAME: ${{ vars.DB_EXISTING_SECRET_NAME || 'music-platform-secret' }}
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/music-platform-api
  HELM_VERSION: v3.15.4
  TERRAFORM_VERSION: 1.6.6
  TERRAFORM_LOCK_TIMEOUT: 120s
  KUBECTL_VERSION: v1.30.0

jobs:
  validate:
    name: Validate Build And Manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install runtime and test dependencies
        run: python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run API contract tests
        run: python3 -m pytest -q tests

      - name: Compile Python modules
        run: python3 -m compileall app

      - name: Build Docker image (validation only)
        run: docker build -t music-platform-api:ci .

      - name: Install Helm CLI
        run: |
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLo helm.tar.gz \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf helm.tar.gz
          sudo install -m 0755 linux-amd64/helm /usr/local/bin/helm
          rm -rf helm.tar.gz linux-amd64

      - name: Install Terraform CLI
        run: |
          TF_TMP_DIR="$(mktemp -d)"
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLo "${TF_TMP_DIR}/terraform.zip" \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          unzip -o "${TF_TMP_DIR}/terraform.zip" -d "${TF_TMP_DIR}"
          sudo install -m 0755 "${TF_TMP_DIR}/terraform" /usr/local/bin/terraform
          rm -rf "${TF_TMP_DIR}"

      - name: Helm lint
        run: helm lint helm/music-platform

      - name: Helm template render
        run: helm template music-platform helm/music-platform >/tmp/rendered.yaml

      - name: Helm template render (external secret mode)
        run: |
          helm template music-platform helm/music-platform \
            --set db.existingSecret=runtime-db-secret >/tmp/rendered-external-secret.yaml

      - name: Render Istio manifests with workflow namespace
        run: ./scripts/render-istio-manifests.sh >/tmp/istio-rendered.yaml

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check

      - name: Terraform init (validate mode)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

  deploy:
    name: Build Push And Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check deploy prerequisites
        id: precheck
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "${KUBE_CONFIG_DATA}" ]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping deploy because KUBE_CONFIG_DATA is not configured."
          else
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        if: steps.precheck.outputs.ready == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        if: steps.precheck.outputs.ready == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: steps.precheck.outputs.ready == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Install kubectl, Helm and Terraform CLIs
        if: steps.precheck.outputs.ready == 'true'
        run: |
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLo kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl
          rm kubectl
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLo helm.tar.gz \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf helm.tar.gz
          sudo install -m 0755 linux-amd64/helm /usr/local/bin/helm
          rm -rf helm.tar.gz linux-amd64
          TF_TMP_DIR="$(mktemp -d)"
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSLo "${TF_TMP_DIR}/terraform.zip" \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          unzip -o "${TF_TMP_DIR}/terraform.zip" -d "${TF_TMP_DIR}"
          sudo install -m 0755 "${TF_TMP_DIR}/terraform" /usr/local/bin/terraform
          rm -rf "${TF_TMP_DIR}"

      - name: Configure kubeconfig
        if: steps.precheck.outputs.ready == 'true'
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "${HOME}/.kube/config"

      - name: Terraform init
        if: steps.precheck.outputs.ready == 'true'
        run: terraform -chdir=terraform init

      - name: Terraform import existing namespace (if present)
        if: steps.precheck.outputs.ready == 'true'
        run: |
          if kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1; then
            terraform -chdir=terraform import -input=false -lock-timeout="${TERRAFORM_LOCK_TIMEOUT}" kubernetes_namespace_v1.music_platform "${NAMESPACE}" || true
          fi

      - name: Terraform apply foundation
        if: steps.precheck.outputs.ready == 'true'
        run: |
          terraform -chdir=terraform apply -auto-approve -input=false -lock-timeout="${TERRAFORM_LOCK_TIMEOUT}" \
            -var="kubeconfig_path=${HOME}/.kube/config" \
            -var="namespace_name=${NAMESPACE}"

      - name: Verify external DB secret for deploy
        if: steps.precheck.outputs.ready == 'true'
        run: |
          if ! kubectl get secret "${DB_EXISTING_SECRET_NAME}" -n "${NAMESPACE}" >/dev/null 2>&1; then
            echo "::error::Required secret '${DB_EXISTING_SECRET_NAME}' was not found in namespace '${NAMESPACE}'."
            echo "::error::Create it with keys DATABASE_URL and POSTGRES_PASSWORD before running deploy."
            exit 1
          fi

          missing_keys=""
          for key in DATABASE_URL POSTGRES_PASSWORD; do
            value="$(kubectl get secret "${DB_EXISTING_SECRET_NAME}" -n "${NAMESPACE}" -o "jsonpath={.data['${key}']}")"
            if [ -z "${value}" ]; then
              missing_keys="${missing_keys} ${key}"
            fi
          done

          if [ -n "${missing_keys}" ]; then
            echo "::error::Secret '${DB_EXISTING_SECRET_NAME}' is missing required keys:${missing_keys}"
            exit 1
          fi

      - name: Deploy Helm release
        if: steps.precheck.outputs.ready == 'true'
        run: |
          helm upgrade --install "${RELEASE_NAME}" helm/music-platform \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set api.image.repository="${IMAGE_NAME}" \
            --set api.image.tag="${GITHUB_SHA}" \
            --set db.existingSecret="${DB_EXISTING_SECRET_NAME}"

      - name: Apply Istio traffic and security policies
        if: steps.precheck.outputs.ready == 'true'
        run: |
          ./scripts/render-istio-manifests.sh | kubectl apply -n "${NAMESPACE}" -f -

      - name: Verify rollout and security resources
        if: steps.precheck.outputs.ready == 'true'
        run: |
          kubectl rollout status deployment/music-platform-api -n "${NAMESPACE}" --timeout=300s
          kubectl rollout status statefulset/music-platform-db -n "${NAMESPACE}" --timeout=300s
          kubectl get pods -n "${NAMESPACE}" -o wide
          kubectl get gateway,virtualservice,destinationrule -n "${NAMESPACE}"
          kubectl get peerauthentication,authorizationpolicy -n "${NAMESPACE}"

      - name: Cleanup kubeconfig
        if: always() && steps.precheck.outputs.ready == 'true'
        run: rm -f "${HOME}/.kube/config"

apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: playcatch-gateway
  namespace: __NAMESPACE__
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - __ISTIO_HOST__
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: playcatch-api-ingress
  namespace: __NAMESPACE__
spec:
  hosts:
    - __ISTIO_HOST__
  gateways:
    - playcatch-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: __API_SERVICE_HOST__
            port:
              number: 8000
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: playcatch-api-resilience
  namespace: __NAMESPACE__
spec:
  host: __API_SERVICE_HOST__
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 10s
      http:
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 100
        maxRetries: 3
        idleTimeout: 30s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

apiVersion: v1
kind: Service
metadata:
  name: {{ include "music-platform.apiName" . }}
  labels:
    {{- include "music-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "music-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api

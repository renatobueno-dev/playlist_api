apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "music-platform.dbName" . }}
  labels:
    {{- include "music-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  serviceName: {{ include "music-platform.dbServiceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "music-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        {{- include "music-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db
    spec:
      serviceAccountName: {{ include "music-platform.dbServiceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      {{- if not .Values.db.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: {{ .Values.db.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: postgres
              containerPort: {{ .Values.db.service.port }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "music-platform.configMapName" . }}
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "music-platform.configMapName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-platform.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.db.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.db.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.db.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.db.probes.startup.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.db.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.db.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.db.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.db.probes.readiness.failureThreshold }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.db.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.db.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.db.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.db.probes.liveness.failureThreshold }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.db.resources | nindent 12 }}
  {{- if .Values.db.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.db.persistence.size }}
        {{- if .Values.db.persistence.storageClass }}
        storageClassName: {{ .Values.db.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}

{{- $dbHost := include "music-platform.dbServiceName" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "music-platform.secretName" . }}
  labels:
    {{- include "music-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.db.password | quote }}
  DATABASE_URL: {{ printf "postgresql+psycopg://%s:%s@%s:%v/%s" .Values.db.user .Values.db.password $dbHost .Values.db.service.port .Values.db.name | quote }}
